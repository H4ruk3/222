<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Ваш личный тренер | Регистрация</title>
	<link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="css/login1.css">
  <link rel="stylesheet" href="bootmetro-icons.css">
</head>
<body>
	<div class=dialog>
		<p class="logo">
			<img src="img/logo_site.png" />
		</p>
		<div id="registration" class="regblock" style="display: none">
			<H1>Регистрация</H1>
			<form>
				<input type="text" name="login" placeholder="Введите логин" />
				<p>Логином для входа в систему является ваш e-mail адрес</p>
				<div class="password">
				<input type="password" id="password" name="password" placeholder="Вы не заполнили поле пароля" /> <span id="eye" onclick="togglepassw()" class="glyphicon glyphicon-eye-open eye"></span>
			</div>
				<p>Минимум 5 символов</p>
				<p class="center"><img id="capcha" src="img/hero-recaptcha-demo.gif" /></p>
				<p>
				<input type="checkbox" name="accept" value="accept" id=äccept""> <label for="accept">Согласен с какими нибудь правилами или чем-то там еще</label>
			</p>
				<input type="button" name="submit" value="Зарегистрироваться">
			</form>
			<p class="center or">или</p>
			<p class="center">
				<a href="#"><img src="img/vk.png" /></a>
				<a href="#"><img src="img/fb.png" /></a>

			</p>
		</div>

<!--  Авторизация  -->
		<div id="login" class="regblock">
			<H1>Вход</H1>
			<form>
				<input type="text" id="loginfield" name="login" placeholder="E-mail адрес (логин)" />
				<br>
				<div class="password">
				<input type="password" id="password" name="password" placeholder="Пароль" /> <span id="eye" onclick="togglepassw()" class="glyphicon glyphicon-eye-open eye"></span>
			</div>
			<br>
				<p>
				<input type="checkbox" name="accept" value="accept" id=äccept""> <label for="accept">Запомнить меня</label>
			</p>
				<input type="button" name="submit" value="Войти">
			</form>
			<div class="col-lg-6 hrefs"><a href="#" onclick="return registration();">Регистрация</a></div>
			<div class="col-lg-6 hrefs"><a href="#" onclick="return restore();">Забыли пароль?</a></div>
			<p class="center or">или</p>
			<p class="center">
				<a href="#" ><img src="img/vk.png" /></a>
				<a href="#" ><img src="img/fb.png" /></a>

			</p>
		</div>


<!--  Восстановление пароля  -->
	<div id="restore" class="regblock" style="display: none">
			<H1>Восстановление доступа</H1>
			<form>
				<input type="text" id="loginfield" name="login" placeholder="E-mail адрес (логин)" />
				<p class="center"><img id="capcha" src="img/hero-recaptcha-demo.gif" /></p>
				<input type="button" name="submit" value="Восстановить">
			</form>
			
		</div>



	</div>



	<script src="js/jquery-1.10.0.min.js"></script>
	<script src="bootstrap/js/bootstrap.min.js"></script>
	<script type="text/javascript">
		function registration() {
			$("#registration").css("display", "block");
			$("#login").css("display", "none");
			$("#restore").css("display", "none");
			return true;
		}

		function restore() {
			$("#registration").css("display", "none");
			$("#login").css("display", "none");
			$("#restore").css("display", "block");
			return true;
		}

		function togglepassw() {
			if ($("#password").get(0).type == "password") {
				$("#password").get(0).type = 'text';
				$("#eye").addClass('glyphicon-eye-close');
			$("#eye").removeClass(' glyphicon-eye-open ');
			}

			else {
				$("#password").get(0).type = 'password';
				$("#eye").removeClass('glyphicon-eye-close');
			$("#eye").addClass(' glyphicon-eye-open ');
			}
		}
	</script>
</body>
</html>
