	<div id="login" class="container regmain">
		<div class="regform">
      <div class="row tabs">
        <div class="col-lg-3" onclick="login()">Вход</div>
        <div class="col-lg-3 enactive" onclick="reg()">Регистрация</div>
        <div class="col-lg-6 enactive last">Восстановить пароль</div>
      </div>  
      <H1>Вход на сайт</H1>
      <form>
      <input type="text" class="text mail" placeholder="Логин"/>
      <input type="password" class="text pass" placeholder="Пароль" />
      <input type="submit" class="button" value="Войти" />
      </form>
    </div>
	</div>
  <!--Регистрация -->
  <div id = "reg" class="container regmain">
    <div class="regform">
      <div class="row tabs">
        <div class="col-lg-3 enactive" onclick="login()">Вход</div>
        <div class="col-lg-3" onclick="reg()">Регистрация</div>
        <div class="col-lg-6 enactive last">Восстановить пароль</div>
      </div>  
      <H1>Регистрация нового пользователя</H1>
      <form>
      <input type="text" class="text mail" placeholder="Логин"/>
      <input type="password" class="text pass" placeholder="Пароль" />
      <img src="img/hero-recaptcha-demo.gif" alt="reCAPTCHA demo" style="height:110px">
      <input type="submit" class="button" value="Зарегистрироваться" />
      </form>
    </div>
  </div>

	<script src="js/jquery-1.10.0.min.js"></script>
	<script src="bootstrap/js/bootstrap.min.js"></script>
  <script type="text/javascript">
    function login() {
      $("#login").attr("style", "display: block");
      $("#reg").attr("style", "display: none");
    }
    function reg() {
     $("#reg").attr("style", "display: block");
      $("#login").attr("style", "display: none"); 
    }
  </script>
